experiment:
  id: mappo_ovh_smoke
  name: "Discovery / MAPPO OVH smoke (F6.5)"
  description: "OVH-targeted smoke run; storage.path resolves under /workspace/results."
  seed: 0

scenario:
  type: discovery
  params:
    n_agents: 2
    n_targets: 2
    agents_per_target: 2
    targets_respawn: false
    shared_reward: true
    max_steps: 10

algorithm:
  type: mappo
  params: {}

training:
  max_iters: 1
  num_envs: 1
  device: cpu
  frames_per_batch: 50
  minibatch_size: 25
  n_minibatch_iters: 1

evaluation:
  interval_iters: 1
  episodes: 1

runtime:
  runner:
    type: local        # the *job* uses LocalRunner inside the container; OvhRunner orchestrates from outside.
    params:
      record_video: false
  storage:
    type: fs
    path: /workspace/results    # OVH mount; rwd permission for write-back.
    params: {}
