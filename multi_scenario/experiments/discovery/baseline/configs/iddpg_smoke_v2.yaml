experiment:
  id: iddpg_smoke
  seed: 0
  name: Discovery / IDDPG smoke
  description: 1-iter, 1-env smoke run used to validate the F3.3 IDDPG adapter slice.
scenario:
  type: discovery
  params:
    n_agents: 2
    n_targets: 2
    agents_per_target: 2
    targets_respawn: false
    shared_reward: true
    max_steps: 10
algorithm:
  type: iddpg
  params: {}
training:
  max_iters: 1
  num_envs: 1
  device: cpu
  frames_per_batch: 50
  minibatch_size: 25
  n_minibatch_iters: 1
evaluation:
  interval_iters: 1
  episodes: 1
runtime:
  runner:
    type: ovh
    params:
      record_video: false
  storage:
    type: fs
    params: {}
    path: experiments/discovery/baseline
