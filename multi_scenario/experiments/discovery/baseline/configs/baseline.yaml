# ER1 reference baseline — k=2 rendezvous on VMAS Discovery (covering_range=0.35).
#
# Reproducibility target: rendezvous_comm/configs/er1/single_al_lp_sr_cr035.yaml
# Headline (rendezvous_comm doc): M1 ≈ 0.405 at 10M frames, single seed.
# coopvmas reproducibility threshold: ±10% absolute on M1 AND within 1.5σ of
# rendezvous_comm seed-mean. See implementation_plan.md F8.
#
# Per-field parity is checked by tests/reproducibility/test_er1_config_parity.py
# against the rendezvous_comm source — silent drift fails the test.
#
# ── Three things to know before reading this YAML ───────────────────
#
# 1. ``shared_reward: true`` is intentional. The rendezvous_comm filename
#    encodes the feature flags (``al`` = Agent Lidar, ``lp`` = Low Penalty,
#    ``sr`` = Shared Reward); the ER1 M1≈0.405 headline number is the
#    ``_sr_`` variant. Side effect on this baseline: M8 (Agent Utilization
#    CV) reports 0 because the unmodified VMAS Discovery scenario returns
#    a single scalar covering_reward shared across all agents. M8 only
#    becomes meaningful once the LERO scenario patcher (F9.5) overrides
#    ``info()`` to return per-agent rewards. M8=0 for ER1 matches
#    rendezvous_comm's own ER1 numbers.
#
# 2. ``runtime.runner.type: ovh`` + ``training.device: cuda`` is the
#    canonical OVH+GPU combo (F7.7.A4). To run locally for debugging,
#    override at submit time:
#      multi-scenario run --runner local <this-yaml>          # local CPU
#      multi-scenario sweep --runner local --seeds 0 1 2 <this-yaml>
#    Inside the OVH container, LocalRunner reads this YAML and drives
#    BenchMARL on CUDA against the V100S the OvhJobConfig requests.
#
# 3. ``runtime.storage.path: /workspace/results`` is the in-CONTAINER mount
#    (per OvhJobConfig.mount_results). For ``--runner local`` overrides
#    on a Mac, edit the path to a host directory (e.g. ``experiments/...``)
#    or expect a write-permission error.
#
# 4. Reproducibility note: rendezvous_comm's headline used CPU; we use
#    CUDA on V100S. Float-order differs → policy gradients won't match
#    bit-exact, but mean M1 typically lands within ±2-3% of CPU runs of
#    the same hyperparameters — comfortably inside the F8 ±10% threshold.

experiment:
  id: er1_cr035
  seed: 0
  name: "ER1 + AL + LP+SR (covering_range=0.35)"
  description: >
    Reference baseline reproducing rendezvous_comm `er1_al_lp_sr_cr035`:
    4 agents, 4 targets, k=2, covering_range=0.35, max_steps=200, agent
    lidar on, low collision penalty, shared reward.
    Headline reproducibility target: M1 ≈ 0.405 at 10M frames (seed 0).

scenario:
  type: discovery
  params:
    # Task topology (ER1 k=2 rendezvous: 4 agents share 4 targets, two-per-target).
    n_agents: 4
    n_targets: 4
    agents_per_target: 2
    # Sensor geometry.
    lidar_range: 0.35
    covering_range: 0.35
    use_agent_lidar: true
    n_lidar_rays_entities: 15
    n_lidar_rays_agents: 12
    # Episode dynamics.
    targets_respawn: false      # required for M1 cumsum semantics
    shared_reward: true
    max_steps: 200
    # Reward shaping.
    agent_collision_penalty: -0.01
    covering_rew_coeff: 1.0
    time_penalty: -0.01

algorithm:
  type: mappo
  params:
    # GAE lambda — PPO-specific, lives in algorithm.params (not training.*).
    lmbda: 0.95

training:
  # rendezvous_comm uses BenchMARL's max_n_frames=10_000_000 cap.
  # 167 iters × 60_000 frames/batch = 10_020_000 frames ≈ 10M (smallest
  # integer ≥ rendezvous_comm's frame target).
  max_iters: 167
  num_envs: 600
  device: cuda  # V100S on OVH; --runner local overrides require cpu/host edit
  lr: 0.00005
  gamma: 0.99
  frames_per_batch: 60000
  minibatch_size: 4096
  n_minibatch_iters: 45
  share_policy_params: true
  # ~17 BenchMARL checkpoints over the 167-iter run; rendezvous_comm
  # didn't checkpoint mid-run but having them makes resume + post-hoc
  # eval (F8.5.D best-checkpoint policy) cheap.
  checkpoint_interval_iters: 10

evaluation:
  # rendezvous_comm: evaluation_interval=120_000 frames = 2 iters @ 60k frames/batch.
  interval_iters: 2
  episodes: 200

runtime:
  runner:
    type: ovh   # F7.7.A4: drives `multi-scenario run` dispatch (LocalRunner inside container).
    params: {}
    # F8.2.A: record_video defaults to True for non-smoke runs (exp_id doesn't
    # end in "_smoke"). Produces 2 short MP4s — random-init "before" + trained
    # "after" — adds ~30s on V100S, well worth it for post-hoc visual analysis.
    # OVH-headless containers fail the inline render fail-soft (F6.6); videos
    # materialise locally via post-pullback regen (F8.2.D + F8.2.B).
  storage:
    type: fs
    path: /workspace/results  # OVH container mount (OvhJobConfig.mount_results).
    params: {}
