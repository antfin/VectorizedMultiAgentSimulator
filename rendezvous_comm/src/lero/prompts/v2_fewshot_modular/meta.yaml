version: v2_fewshot_modular
author: rendezvous_comm
date: 2026-04-21
parent: v2_fewshot
description: >
  Slot-decomposed version of v2_fewshot for LERO-MP meta-prompting.
  Renders behavior-identically to v2_fewshot when slots are assembled
  in the declared order. Adds a frozen `fairness` slot that the
  meta-LLM may read but never edit.

# Concatenated in this order to form the final initial_user prompt.
# Each slot is a separate file; an empty file contributes nothing.
# Slots marked `frozen: true` are read-only for the meta-prompt optimizer.
initial_user_slots:
  - name: task_context
    file: task_context.txt
  - name: current_code
    file: current_code.txt
  - name: state_schema
    file: state_schema.txt
  - name: fairness
    file: fairness.txt
    frozen: true
  - name: guidance
    file: guidance.txt
  - name: examples
    file: examples.txt
  - name: output_spec
    file: output_spec.txt

# Canonical sha256 hashes of frozen slots. The loader verifies these
# before rendering; a mismatch raises FairnessViolation.
# Filled in by running `python -m rendezvous_comm.src.lero.meta.provenance
# recompute-frozen-hashes v2_fewshot_modular` after the initial slot files
# are authored. Empty string = not yet pinned.
frozen_hashes:
  fairness: "95d5ca8be490f622afd72e630f12124e71e8e5e236b927e2d7671e8a7715c831"
