version: v2_fewshot_modular_v2
author: rendezvous_comm
date: 2026-04-23
parent: v2_fewshot_modular
description: >
  Second-generation slot-decomposed prompt for LERO-MP v2 (two-level
  meta-prompting). Splits the single `guidance` slot into three
  sub-slots so a single mutation can target reward-specific,
  observation-specific, or shared advice independently. This lets
  the Strategist (Level 1) pick a domain and the Editor (Level 2)
  write targeted text without the two aspects polluting each other.

  Assembly order is:
    task_context → current_code → state_schema → fairness (FROZEN)
    → guidance_shared → guidance_reward → guidance_observation
    → examples → output_spec

  When all three guidance sub-slots are empty (default), the rendered
  prompt is IDENTICAL to v2_fewshot_modular — no behavior change for
  the inner LLM until a mutation lands.

initial_user_slots:
  - name: task_context
    file: task_context.txt
  - name: current_code
    file: current_code.txt
  - name: state_schema
    file: state_schema.txt
  - name: fairness
    file: fairness.txt
    frozen: true
  - name: guidance_shared
    file: guidance_shared.txt
  - name: guidance_reward
    file: guidance_reward.txt
  - name: guidance_observation
    file: guidance_observation.txt
  - name: examples
    file: examples.txt
  - name: output_spec
    file: output_spec.txt

frozen_hashes:
  fairness: "95d5ca8be490f622afd72e630f12124e71e8e5e236b927e2d7671e8a7715c831"
