exp_id: lero_mp_quick_k2_cr035
name: "LERO-MP quick validation — k=2 cr=0.35, 1M frames, 3 outer iters"
description: >
  Compressed version of mp_k2_obsonly_cr035.yaml sized to finish in
  ~2.5h per seed so 3 seeds in parallel complete in ~2.5h wall clock.

  Same task as mp_k2_obsonly_cr035 (n=4 t=4 k=2 lidar=0.35 cr=0.35) —
  compatible with ER1/ER3 baselines. Meta-prompt outer loop enabled
  with max_outer_iters=3 so we observe the full mutation cycle
  (2 baseline records + 1 post-mutation record).

  Purpose: verify on OVH that (a) M1 is non-zero at 1M full training,
  (b) meta-LLM mutation fires and produces reasonable text, (c) the
  post-mutation outer iter actually runs under the new template, with
  3 seeds of variance. NOT a final result run — for that use
  mp_k2_obsonly_cr035.yaml with 10M full training.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.35
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 1_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 2
  n_candidates: 3
  top_k: 2
  eval_frames: 500_000
  eval_episodes: 100
  full_frames: 1_000_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v2_fewshot_modular"

meta_prompt:
  enabled: true
  meta_model: "gpt-5.4-mini"
  meta_temperature: 0.3
  seeds: [0, 1, 2]
  slot_policy: "failmode_taxonomy"
  trigger:
    # plateau_delta=0.99 guarantees plateau fires on record #2 so the
    # meta-LLM is exercised regardless of M1 fluctuations. Real
    # experiment uses 0.03 (meaningful improvement threshold).
    plateau_iters: 1
    plateau_delta: 0.99
    variance_threshold: 0.15
    peak_vs_final_gap_max: 0.20
    cooldown_inner_iters: 0
  budget:
    # 3 outer iters = 2 baseline + 1 mutation + 1 post-mutation
    max_outer_iters: 3
    max_total_inner_candidates: 30
    tier2_promotion_gap: 0.05
  fairness:
    whitelist_strict: true
    waiver: null

sweep:
  seeds: [0, 1, 2]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
