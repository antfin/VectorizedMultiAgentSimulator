exp_id: lero_mp_dryrun
name: "LERO-MP P0 dry-run (behavior-identical re-baseline)"
description: >
  Smoke-test config for Phase P0 of LERO-MP. Meta-prompt outer loop
  DISABLED; uses v2_fewshot_modular (slot-decomposed) which should
  render identically to v2_fewshot except for the new fairness slot.
  Runs 1 iteration × 2 candidates at 100k eval frames just to verify
  the pipeline compiles and the fairness whitelist doesn't reject a
  well-behaved observation function.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.35
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 200_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 60_000
  evaluation_episodes: 50
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 2
  top_k: 1
  eval_frames: 100_000
  eval_episodes: 20
  full_frames: 200_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v2_fewshot_modular"

meta_prompt:
  enabled: false

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
