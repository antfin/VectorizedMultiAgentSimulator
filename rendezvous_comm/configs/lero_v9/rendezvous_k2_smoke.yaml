exp_id: lero_v9_smoke
name: "LERO v9 SMOKE — Mac pipeline check (task_domain + CoT + memory)"
description: >
  Tiny end-to-end run to verify v9: task_domain.yaml read → CoT bundle
  enumeration → inferable_hints + examples + feedback artifacts → inner
  loop → combined diagnose+reflect with memory → next outer.
  1 outer × 1 inner × 1 cand × 100k frames. Wall ~5-10 min on Mac.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 200_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 30000
  on_policy_n_envs_per_worker: 300
  on_policy_n_minibatch_iters: 30
  on_policy_minibatch_size: 2048
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 60_000
  evaluation_episodes: 50
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 1
  top_k: 1
  eval_frames: 100_000
  eval_episodes: 50
  full_frames: 200_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v3_modular_taskdomain"

v9:
  max_outer: 1                    # smoke override; full run uses bundle_size
  n_inner_iter: 1
  n_inner_candidates_per_iter: 1
  eval_frames: 100_000
  base_prompt_version: "v3_modular_taskdomain"
  meta_model: "gpt-5.4-mini"
  meta_temperature: 0.8
  memory_lookback_n: 3
  task_summary: |
    Multi-agent rendezvous. 4 agents must cover 4 targets, each requiring
    exactly 2 simultaneous occupants within covering_range=0.25. Local
    LiDAR-only observations.

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
