exp_id: lero_v9_rendezvous_k2_2x3
name: "LERO v9 — task_domain + CoT + memory, serial bundle coverage"
description: >
  v9 full RL: task_domain.yaml drives framing + mandatory features (role
  one-hot mandatory). CoT-bundle metaprompt + combined diagnose+reflect
  with N=3 memory lookback. Serial coverage: max_outer = bundle_size
  (typically 3-5), so every strategy in the bundle gets one shot at
  refinement before the run ends. 1M frames per candidate.

  Same task as v8 Phase-3 (cr=0.25, ms=400, k=2, 4 agents 4 targets).
  Wall ~5-8h on Mac (bundle_size × 3 inner × 3 cands × ~9 min/cand).

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 1_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 100
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 1
  top_k: 1
  eval_frames: 1_000_000
  eval_episodes: 100
  full_frames: 1_000_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v3_modular_taskdomain"

v9:
  # No max_outer — uses bundle_size (3-5 typically) for serial coverage.
  n_inner_iter: 3
  n_inner_candidates_per_iter: 3
  eval_frames: 1_000_000
  base_prompt_version: "v3_modular_taskdomain"
  meta_model: "gpt-5.4-mini"
  meta_temperature: 0.8
  memory_lookback_n: 3
  task_summary: |
    Multi-agent rendezvous in VMAS Discovery scenario. 4 agents must
    collectively cover 4 targets, with each target requiring exactly 2
    agents simultaneously within covering_range=0.25 (NOT lidar_range).
    Local observations only.

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
