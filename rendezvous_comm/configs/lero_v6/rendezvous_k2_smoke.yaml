exp_id: lero_v6_smoke
name: "LERO v6 SMOKE — Mac M2 Pro pipeline check"
description: >
  Tiny end-to-end run to verify v6: outer→inner→meta-strategist→
  decision enforcement → conditional next iter / early stop. No
  deep-train (commented out). 2 outer iters max × 2 inner-iter ×
  1 cand × 100k frames = ~400k frames per seed. Wall ~10 min on
  M2 Pro.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 200_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 30000
  on_policy_n_envs_per_worker: 300
  on_policy_n_minibatch_iters: 30
  on_policy_minibatch_size: 2048
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 60_000
  evaluation_episodes: 50
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 1
  top_k: 1
  eval_frames: 100_000
  eval_episodes: 50
  full_frames: 200_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 1.0
  max_retries: 3
  prompt_version: "v2_fewshot_modular_v2_local"

v6:
  max_outer: 2
  n_inner_iter: 2
  n_inner_candidates_per_iter: 1
  eval_frames: 100_000
  base_prompt_version: "v2_fewshot_modular_v2_local"
  meta_model: "gpt-5.4-mini"
  meta_temperature: 1.0
  task_summary: |
    Multi-agent rendezvous in VMAS Discovery scenario. 4 agents must
    collectively cover 4 targets, with each target requiring exactly 2
    agents simultaneously within covering_range to count as covered.
    Local observations only (lidar + own pos/vel). The challenge is
    implicit coordination: agents need to spread out, identify partners,
    and converge on shared targets without communication.

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
