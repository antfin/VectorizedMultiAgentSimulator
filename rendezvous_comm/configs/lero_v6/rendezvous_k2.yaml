exp_id: lero_v6_rendezvous_k2
name: "LERO v6 — simplicity-first meta-strategy, inner-only validation"
description: >
  v6: meta-LLM rediscovers an S3b-local-quality coordination prompt
  through simplicity-first reasoning + reflection on inner feedback.
  No deep-train inside the loop (deep_train_winner is commented out;
  uncomment + run separately once a found_good candidate is identified).

  Per-seed budget (worst case, no early stop): 5 outer × 4 inner-iter
  × 3 cands × 1M = 60M frames. ~12-20h on M2 Pro Mac sequential.
  Best case (early stop at outer 1): 12M frames, ~3-5h.

  Same cr=0.25 / ms=400 task as S3b-local for direct comparison.
  Inner uses v2_fewshot_modular_v2_local — local-mode-fixed base
  template (state_schema lists only local keys; minimal obs example
  anchors output format without prescribing answer features).

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 1_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 100
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 1
  top_k: 1
  eval_frames: 1_000_000
  eval_episodes: 100
  full_frames: 1_000_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v2_fewshot_modular_v2_local"

v6:
  max_outer: 5
  n_inner_iter: 4
  n_inner_candidates_per_iter: 3
  eval_frames: 1_000_000
  base_prompt_version: "v2_fewshot_modular_v2_local"
  meta_model: "gpt-5.4-mini"
  meta_temperature: 0.8
  task_summary: |
    Multi-agent rendezvous in VMAS Discovery scenario. 4 agents must
    collectively cover 4 targets, with each target requiring exactly 2
    agents simultaneously within covering_range to count as covered.
    Local observations only (lidar + own pos/vel). The challenge is
    implicit coordination: agents need to spread out, identify partners,
    and converge on shared targets without communication. No 10M
    deep-train in v6; we validate the meta-strategy purely on inner
    M1 reaching ≥ 0.05 with monotonic_rise / late_ramp shape.

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
