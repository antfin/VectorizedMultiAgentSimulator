exp_id: er2_al_lp_sr_bc_dimc8
name: "Comm + AL + LP+SR + Broadcast (dim_c=8)"
description: >
  Full stack: agent lidar + comm + reward shaping + broadcast.
  Medium channel (dim_c=8, obs=55, act=10). Same as ER2_AL+LP+SR
  but with broadcast instead of proximity gating.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200
  dim_c: 8
  comm_proximity: false

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 1200
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cuda
  sampling_device: cuda
  lmbda: 0.95

sweep:
  seeds: [0, 1]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
