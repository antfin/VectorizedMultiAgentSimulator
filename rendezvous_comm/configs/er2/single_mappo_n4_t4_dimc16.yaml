exp_id: er2_bc_dimc16
name: "Emergent Comm — Broadcast + Large Channel (dim_c=16)"
description: >
  dim_c=16, full broadcast. More bandwidth but larger obs (67 vs 43)
  and action space (18 vs 10). Tests if 8 is too small for coordination.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: false
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: false
  agent_collision_penalty: -0.1
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200
  dim_c: 16
  comm_proximity: false

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 1200
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cuda
  sampling_device: cuda
  lmbda: 0.95

sweep:
  seeds: [0, 1]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
