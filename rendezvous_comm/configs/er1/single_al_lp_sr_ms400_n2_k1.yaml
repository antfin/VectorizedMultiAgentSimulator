exp_id: er1_al_lp_sr_ms400_n2_k1
name: "ER1 + AL + LP+SR (max_steps=400, 2 agents, k=1)"
description: >
  Same as ER1+AL+LP+SR ms400 but with 2 agents and agents_per_target=1.
  Tests if the task is solvable with minimal team size (each target
  needs only 1 agent to cover it).

task:
  n_agents: 2
  n_targets: 4
  agents_per_target: 1
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

sweep:
  seeds: [0]
  n_agents: [2]
  n_targets: [4]
  agents_per_target: [1]
  lidar_range: [0.35]
  algorithms: [mappo]
