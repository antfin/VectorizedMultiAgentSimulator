exp_id: er1
name: "No-Comm Control"
description: >
  Isolates baseline task difficulty by removing ALL communication.
  Establishes the floor that any comm method must beat.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: false
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: false
  agent_collision_penalty: -0.1
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200

train:
  algorithm: mappo
  max_n_frames: 6_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 60
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 600_000
  evaluation_episodes: 50
  train_device: cpu
  sampling_device: cpu

sweep:
  seeds: [0]
  n_agents: [4, 6]
  n_targets: [4]
  agents_per_target: [1, 2]
  lidar_range: [0.35]
  algorithms: [mappo]
