exp_id: er1
name: "Ablation F: Shared Reward for k=2"
description: >
  Tests shared_reward=true for k=2. With individual rewards, agents have weak
  incentive to coordinate (credit assignment problem). Shared reward makes
  covering a team success, removing the need for individual credit.
  CAVEAT: if shared_reward dramatically helps, this changes the experimental
  comparison since comm experiments use individual reward. Use as diagnostic
  only — if it works, consider shared_reward as the default for ALL experiments.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: false
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.1
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 1200
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cuda
  sampling_device: cuda
  entropy_coef: 0.01

sweep:
  seeds: [0, 1, 2]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
