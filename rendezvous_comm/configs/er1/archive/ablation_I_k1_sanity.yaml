exp_id: er1_abl_i
name: "Ablation I: k=1 Sanity Check"
description: >
  Runs the winning hyperparam (lmbda=0.95) on EASY config (k=1) to verify
  it doesn't hurt performance. D showed lr=1e-4 doesn't compound, so using
  baseline lr=5e-5. If k=1 regresses, lmbda=0.95 is k=2-specific.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 1
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: false
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: false
  agent_collision_penalty: -0.1
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 200

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 1200
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cuda
  sampling_device: cuda
  lmbda: 0.95

sweep:
  seeds: [0, 1, 2]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [1]
  lidar_range: [0.35]
  algorithms: [mappo]
