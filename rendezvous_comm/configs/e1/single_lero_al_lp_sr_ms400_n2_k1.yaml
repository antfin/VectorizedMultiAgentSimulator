exp_id: e1_al_lp_sr_ms400_n2_k1
name: "E1 LERO + AL + LP+SR (max_steps=400, 2 agents, k=1)"
description: >
  LERO framework applied to minimal ER1 config (no communication).
  2 agents, k=1, faster iteration and sanity check.
  Same task params as er1_al_lp_sr_ms400_n2_k1 for direct comparison.

task:
  n_agents: 2
  n_targets: 4
  agents_per_target: 1
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400

train:
  algorithm: mappo
  max_n_frames: 10_000_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 60000
  on_policy_n_envs_per_worker: 600
  on_policy_n_minibatch_iters: 45
  on_policy_minibatch_size: 4096
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 120_000
  evaluation_episodes: 200
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 4
  n_candidates: 3
  top_k: 2
  eval_frames: 1_000_000
  eval_episodes: 100
  full_frames: 10_000_000
  evolve_reward: true
  evolve_observation: true

llm:
  model: "openai/gpt-oss-120b"
  api_base: "https://oai.endpoints.kepler.ai.cloud.ovh.net/v1"
  temperature: 0.8
  max_tokens: 4096
  max_retries: 3
  prompt_version: "v1"

sweep:
  seeds: [0]
  n_agents: [2]
  n_targets: [4]
  agents_per_target: [1]
  lidar_range: [0.35]
  algorithms: [mappo]
