exp_id: lero_v8_smoke
name: "LERO v8 SMOKE — Mac pipeline check (density-first)"
description: >
  Tiny end-to-end run to verify v8: bundle enumerate → inner gen → analyze
  → diagnose (with new too_many_features / over_gated labels) → reflect →
  apply slot edits / strategy switch. 2 outer × 2 inner × 1 cand × 100k
  frames = ~400k frames per seed. Wall ~10 min on Mac M2 Pro.

task:
  n_agents: 4
  n_targets: 4
  agents_per_target: 2
  lidar_range: 0.35
  covering_range: 0.25
  use_agent_lidar: true
  n_lidar_rays_entities: 15
  n_lidar_rays_agents: 12
  targets_respawn: false
  shared_reward: true
  agent_collision_penalty: -0.01
  covering_rew_coeff: 1.0
  time_penalty: -0.01
  max_steps: 400
  dim_c: 0

train:
  algorithm: mappo
  max_n_frames: 200_000
  gamma: 0.99
  on_policy_collected_frames_per_batch: 30000
  on_policy_n_envs_per_worker: 300
  on_policy_n_minibatch_iters: 30
  on_policy_minibatch_size: 2048
  lr: 0.00005
  share_policy_params: true
  evaluation_interval: 60_000
  evaluation_episodes: 50
  train_device: cpu
  sampling_device: cpu
  lmbda: 0.95

lero:
  n_iterations: 1
  n_candidates: 1
  top_k: 1
  eval_frames: 100_000
  eval_episodes: 50
  full_frames: 200_000
  evolve_reward: false
  evolve_observation: true
  reward_mode: "replace"
  obs_state_mode: "local"
  bonus_scale: 0.5
  reward_clip: 50.0
  whitelist_strict: true

llm:
  model: "gpt-5.4-mini"
  temperature: 0.8
  max_retries: 3
  prompt_version: "v2_fewshot_modular_v2_local"

v8:
  max_outer: 2
  n_inner_iter: 2
  n_inner_candidates_per_iter: 1
  eval_frames: 100_000
  base_prompt_version: "v2_fewshot_modular_v2_local"
  meta_model: "gpt-5.4-mini"
  meta_temperature: 0.8
  feature_count_target_min: 8
  feature_count_target_max: 12
  feature_count_cap: 15
  gated_feature_cap: 2
  task_summary: |
    Multi-agent rendezvous in VMAS Discovery scenario. 4 agents must
    collectively cover 4 targets, with each target requiring exactly 2
    agents simultaneously within covering_range=0.25. Local observations
    only (lidar_targets, lidar_agents, agent_pos, agent_vel, agent_idx).
    Implicit coordination from local sensors only.

sweep:
  seeds: [0]
  n_agents: [4]
  n_targets: [4]
  agents_per_target: [2]
  lidar_range: [0.35]
  algorithms: [mappo]
